name: Claude リリースノート チェック

on:
  schedule:
    # 毎日 00:00 UTC → JST 09:00 に実行
    - cron: '0 0 * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 依存関係をインストール
        run: npm ci

      - name: Claude リリースノートをチェック・Slack通知
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node check_claude_news.js

      - name: last_checked.json の変更をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_checked.json
          if git diff --cached --quiet; then
            echo "last_checked.json に変更なし。コミットをスキップします。"
          else
            git commit -m "chore: last_checked.json を更新"
            git push
          fi
